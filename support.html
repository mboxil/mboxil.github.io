<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1" name="viewport"/>
    <title>תמיכה - מדיה בוקס</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root { 
            --bg: #0a0a0a;
            --text: #ffffff;
            --highlight: #fbbf24;
            --card: #171717;
            --border: #f59e0b;
            --gold-gradient: linear-gradient(135deg, #fbbf24, #d97706);
        }

        body { 
            margin: 0; 
            font-family: 'Rubik', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            line-height: 1.6; 
        }

        /* --- הדר שקוף (Glassmorphism) --- */
        .site-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(245, 158, 11, 0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
            z-index: 100000;
            box-sizing: border-box;
        }

        .header-logo {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .header-logo img {
            height: 50px;
            border-radius: 8px;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        /* --- תפריט ניווט Liquid Glass --- */
        .nav-container-liquid {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            background: #0d0d0d;
            padding: 4px;
            border-radius: 50px;
            border: 1.5px solid #2a2a2a;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.6);
            overflow: hidden;
            z-index: 1;
        }

        .nav-link {
            position: relative;
            color: #a1a1aa !important;
            text-decoration: none !important;
            font-weight: 600;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 25px;
            border-radius: 50px;
            z-index: 2;
            transition: color 0.4s ease;
        }

        .nav-link.active {
            color: #ffffff !important;
        }

        .nav-link i { font-size: 1.1rem; transition: 0.3s; }
        .nav-link.active i { color: #000; } /* האייקון נהיה כהה על הרקע הזהוב */

        /* בועת הזכוכית הנוזלית */
        .liquid-blob {
            position: absolute;
            top: 4px;
            left: 4px;
            height: calc(100% - 8px);
            width: 0;
            background: var(--gold-gradient);
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4);
            z-index: 1;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        /* שיתוף */
        .header-share {
            background: var(--gold-gradient);
            color: #000;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
            border: none;
            transition: 0.3s;
        }
        .header-share:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--highlight); }

        /* --- תוכן הדף --- */
        .container { 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 20px; 
            padding-top: 130px; 
        }
        
        h1 { color: var(--highlight); text-align: center; font-size: 2.5rem; margin-bottom: 40px; }

        .support-card { 
            background: var(--card); 
            border: 1px solid #262626; 
            border-radius: 20px; 
            padding: 25px; 
            margin-bottom: 30px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }

        .support-card h2 { 
            color: var(--highlight); 
            margin-top: 0; 
            font-size: 1.5rem; 
            border-bottom: 1px solid #333; 
            padding-bottom: 10px; 
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .video-container { 
            position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; 
            border-radius: 15px; margin-top: 20px; border: 1px solid #333; 
        }
        .video-container iframe { position: absolute; top:0; left:0; width:100%; height:100%; border:0; }

        .footer { text-align: center; padding: 40px 0; color: #71717a; border-top: 1px solid #1a1a1a; margin-top: 50px; }

        @media (max-width: 600px) {
            .site-header { height: 70px; padding: 0 15px; }
            .header-logo img { height: 40px; }
            .nav-link { padding: 8px 15px; font-size: 14px; }
            .header-share span { display: none; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <header class="site-header">
        <a href="https://mboxil.github.io/index.html" class="header-logo">
            <img src="https://raw.githubusercontent.com/mboxil/site/main/logo.jpg" alt="מדיה בוקס">
        </a>

        <nav class="nav-container-liquid">
            <div class="liquid-blob"></div>
            <a href="https://mboxil.github.io/index.html" class="nav-link">
                <i class="fas fa-home"></i>
                <span>ראשי</span>
            </a>
            <a href="https://mboxil.github.io/support.html" class="nav-link active">
                <i class="fas fa-headset"></i>
                <span>תמיכה</span>
            </a>
        </nav>

        <div class="header-share" onclick="shareSite()">
            <i class="fas fa-share-alt"></i>
            <span>שיתוף</span>
        </div>
    </header>

    <div class="container">
        <h1>תמיכה ופתרון תקלות</h1>


        <div class="support-card">
            <h2> ערוץ לא מנגן</h2>
            <p>החלפת מקור ניגון בצורה פשוטה ומהירה.</p>
            <div class="video-container">
                <iframe src="https://player.vimeo.com/video/1171393659" allowfullscreen></iframe>
            </div>
        </div>

        <div class="support-card">
            <h2> אין תוצאות בסרטים וסדרות </h2>
            <p>מחיקת נתונים לחזרה להגדרות יצרן. </p>
            <div class="video-container">
                <iframe src="https://player.vimeo.com/video/1171951589" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 מדיה בוקס - כל הזכויות שמורות</p>
    </footer>

    <script>
        // אנימציית הניווט הנוזלית
        document.addEventListener("DOMContentLoaded", function() {
            const nav = document.querySelector(".nav-container-liquid");
            const links = document.querySelectorAll(".nav-link");
            const blob = document.querySelector(".liquid-blob");

            function updateBlob() {
                const activeLink = document.querySelector(".nav-link.active");
                if (activeLink) {
                    const rect = activeLink.getBoundingClientRect();
                    const navRect = nav.getBoundingClientRect();
                    blob.style.width = `${rect.width}px`;
                    blob.style.left = `${rect.left - navRect.left}px`;
                }
            }

            // הפעלה ראשונית
            setTimeout(updateBlob, 100);

            // עדכון בשינוי גודל מסך
            window.addEventListener("resize", updateBlob);
        });

        // פונקציית שיתוף
        function shareSite() {
            const shareLink = "https://tiny.cc/mboxsite";
            if (navigator.share) {
                navigator.share({ url: shareLink }).catch(() => copyToClipboard(shareLink));
            } else { copyToClipboard(shareLink); }
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => alert("הקישור הועתק ללוח!"));
        }
    </script>
</body>
</html>
