<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1" name="viewport"/>
    <title>תמיכה - מדיה בוקס</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root { 
            --bg: #0a0a0a;
            --text: #ffffff;
            --highlight: #fbbf24;
            --card: #171717;
            --border: #f59e0b;
            --gold-gradient: linear-gradient(180deg, rgba(251, 191, 36, 0.9) 0%, rgba(217, 119, 6, 1) 100%);
        }

        body { 
            margin: 0; 
            font-family: 'Rubik', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            line-height: 1.6; 
            overflow-x: hidden;
        }

        /* --- הדר שקוף --- */
        .site-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(245, 158, 11, 0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
            z-index: 100000;
            box-sizing: border-box;
        }

        /* הגדרת לחיצה בסיסית לכל האלמנטים הלחיצים */
        .header-logo, .nav-link, .header-share {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent; /* מסיר את הריבוע הכחול בנייד */
        }

        /* הוספת מחלקה שתופעל דרך ה-JS */
        .is-pressed {
            transform: scale(0.85) !important;
        }

        .header-logo img {
            height: 50px;
            border-radius: 8px;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        /* --- תפריט ניווט Liquid Glass --- */
        .nav-container-liquid {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            background: rgba(13, 13, 13, 0.9);
            padding: 4px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            z-index: 1;
            gap: 5px;
        }

        .nav-link {
            position: relative;
            color: #a1a1aa !important;
            text-decoration: none !important;
            font-weight: 600;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 25px;
            border-radius: 50px;
            z-index: 2;
        }

        .nav-link.active-blob { color: #000 !important; }

        .liquid-blob {
            position: absolute;
            top: 4px;
            left: 4px;
            height: calc(100% - 8px);
            width: 0;
            background: var(--gold-gradient);
            border-radius: 50px;
            z-index: 1;
            transition: all 0.6s cubic-bezier(0.68, -0.6, 0.32, 1.6);
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.5),
                        inset 0 4px 6px rgba(255, 255, 255, 0.4);
        }

        .header-share {
            background: var(--gold-gradient);
            color: #000;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
            border: none;
        }

        /* --- תוכן --- */
        .container { max-width: 900px; margin: 0 auto; padding: 20px; padding-top: 130px; }
        h1 { color: var(--highlight); text-align: center; font-size: 2.5rem; margin-bottom: 40px; }
        .support-card { background: var(--card); border: 1px solid #262626; border-radius: 20px; padding: 25px; margin-bottom: 30px; }
        .support-card h2 { color: var(--highlight); margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; display: flex; align-items: center; gap: 12px; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 15px; margin-top: 20px; border: 1px solid #333; }
        .video-container iframe { position: absolute; top:0; left:0; width:100%; height:100%; border:0; }
        .footer { text-align: center; padding: 40px 0; color: #71717a; border-top: 1px solid #1a1a1a; margin-top: 50px; }

        @media (max-width: 600px) {
            .site-header { height: 70px; }
            .nav-link span { display: none; }
            .header-share span { display: none; }
        }
    </style>
</head>
<body>

    <header class="site-header">
        <a href="https://mboxil.github.io/index.html" class="header-logo animate-click">
            <img src="https://raw.githubusercontent.com/mboxil/site/main/logo.jpg" alt="מדיה בוקס">
        </a>

        <nav class="nav-container-liquid">
            <div class="liquid-blob"></div>
            <a href="https://mboxil.github.io/index.html" class="nav-link animate-click" id="nav-home">
                <i class="fas fa-home"></i>
                <span>ראשי</span>
            </a>
            <a href="https://mboxil.github.io/support.html" class="nav-link animate-click" id="nav-support">
                <i class="fas fa-headset"></i>
                <span>תמיכה</span>
            </a>
        </nav>

        <div class="header-share animate-click" onclick="shareSite()">
            <i class="fas fa-share-alt"></i>
            <span>שיתוף</span>
        </div>
    </header>

    <div class="container">
        <h1>תמיכה ופתרון תקלות</h1>
        <div class="support-card">
            <h2> ערוץ לא מנגן</h2>
            <p>החלפת מקור ניגון בצורה פשוטה ומהירה.</p>
            <div class="video-container">
                <iframe src="https://player.vimeo.com/video/1171393659" allowfullscreen></iframe>
            </div>
        </div>
        <div class="support-card">
            <h2> אין תוצאות בסרטים וסדרות </h2>
            <p>מחיקת נתונים לחזרה להגדרות יצרן. </p>
            <div class="video-container">
                <iframe src="https://player.vimeo.com/video/1171951589" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 מדיה בוקס - כל הזכויות שמורות</p>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const nav = document.querySelector(".nav-container-liquid");
            const blob = document.querySelector(".liquid-blob");
            const links = document.querySelectorAll(".nav-link");

            function moveBlob(element) {
                if (!element) return;
                const rect = element.getBoundingClientRect();
                const navRect = nav.getBoundingClientRect();
                blob.style.width = `${rect.width}px`;
                blob.style.left = `${rect.left - navRect.left}px`;
                links.forEach(l => l.classList.remove('active-blob'));
                element.classList.add('active-blob');
            }

            const isSupportPage = window.location.pathname.includes("support.html");
            const activeInitial = isSupportPage ? document.getElementById("nav-support") : document.getElementById("nav-home");
            setTimeout(() => moveBlob(activeInitial), 150);

            // --- לוגיקת האנימציה בלחיצה ---
            const clickables = document.querySelectorAll(".animate-click");
            
            clickables.forEach(el => {
                el.addEventListener("click", function(e) {
                    // אם זה קישור (<a>), אנחנו עוצרים את המעבר המיידי
                    const href = this.getAttribute("href");
                    if (href) {
                        e.preventDefault();
                    }

                    // מוסיפים את המחלקה שמכווצת את האלמנט
                    this.classList.add("is-pressed");

                    // אחרי 200 מילי-שניות (מספיק זמן שהעין תקלוט), עוברים דף
                    setTimeout(() => {
                        this.classList.remove("is-pressed");
                        if (href) {
                            window.location.href = href;
                        }
                    }, 200);
                });
            });

            links.forEach(link => {
                link.addEventListener("mouseenter", function() { moveBlob(this); });
            });
            nav.addEventListener("mouseleave", function() { moveBlob(activeInitial); });
        });

        function shareSite() {
            const shareLink = "https://tiny.cc/mboxsite";
            if (navigator.share) {
                navigator.share({ url: shareLink }).catch(() => copyToClipboard(shareLink));
            } else { copyToClipboard(shareLink); }
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert("הקישור הועתק ללוח!");
            });
        }
    </script>
</body>
</html>
